<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="860" height="240" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#64748b" font-size="13" font-weight="600">Pod eviction timeline after node failure</text>

  <!-- Legend -->
  <rect x="200" y="42" width="12" height="10" rx="2" fill="#38bdf8"/>
  <text x="216" y="52" fill="#64748b" font-size="11">Heartbeat window</text>
  <rect x="330" y="42" width="12" height="10" rx="2" fill="#f59e0b"/>
  <text x="346" y="52" fill="#64748b" font-size="11">grace-period</text>
  <rect x="440" y="42" width="12" height="10" rx="2" fill="#ef4444"/>
  <text x="456" y="52" fill="#64748b" font-size="11">tolerationSeconds</text>
  <rect x="590" y="42" width="12" height="10" rx="2" fill="#4ade80"/>
  <text x="606" y="52" fill="#64748b" font-size="11">💥 eviction</text>

  <!-- Scale: 0 → 360s, drawn from x=160 to x=820, total width=660px → 1px ≈ 1.833s -->
  <!-- scale factor: 660/360 = 1.833 -->

  <!-- Axis -->
  <line x1="160" y1="210" x2="830" y2="210" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Ticks every 60s -->
  <line x1="160" y1="206" x2="160" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="226" text-anchor="middle" fill="#64748b" font-size="10">0s</text>
  <line x1="270" y1="206" x2="270" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="270" y="226" text-anchor="middle" fill="#64748b" font-size="10">60s</text>
  <line x1="380" y1="206" x2="380" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="226" text-anchor="middle" fill="#64748b" font-size="10">120s</text>
  <line x1="490" y1="206" x2="490" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="490" y="226" text-anchor="middle" fill="#64748b" font-size="10">180s</text>
  <line x1="600" y1="206" x2="600" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="226" text-anchor="middle" fill="#64748b" font-size="10">240s</text>
  <line x1="710" y1="206" x2="710" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="710" y="226" text-anchor="middle" fill="#64748b" font-size="10">300s</text>
  <line x1="820" y1="206" x2="820" y2="214" stroke="#cbd5e1" stroke-width="1"/>
  <text x="820" y="226" text-anchor="middle" fill="#64748b" font-size="10">360s</text>

  <!-- ROW 1: Aggressive (eviction at 30s) -->
  <!-- label -->
  <text x="150" y="95" text-anchor="end" fill="#f87171" font-size="12" font-weight="700">🔴 Aggressive</text>
  <!-- HB: 0→10s = 0→18.3px -->
  <rect x="160" y="80" width="18" height="22" rx="3" fill="#38bdf8"/>
  <!-- grace: 10→30s = 18.3→55px -->
  <rect x="178" y="80" width="37" height="22" rx="3" fill="#f59e0b"/>
  <!-- tol: 30→40s = 55→73px (just to show it, real end is 30s) -->
  <rect x="215" y="80" width="18" height="22" rx="3" fill="#ef4444"/>
  <!-- eviction marker at 30s = 55px -->
  <line x1="215" y1="72" x2="215" y2="108" stroke="#4ade80" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="218" y="76" fill="#4ade80" font-size="10" font-weight="700">💥 30s</text>

  <!-- ROW 2: Medium (eviction at 200s) -->
  <text x="150" y="145" text-anchor="end" fill="#fbbf24" font-size="12" font-weight="700">🟡 Medium</text>
  <!-- HB: 0→20s = 0→36.6px -->
  <rect x="160" y="130" width="37" height="22" rx="3" fill="#38bdf8"/>
  <!-- grace: 20→140s = 36.6→256.6px -->
  <rect x="197" y="130" width="220" height="22" rx="3" fill="#f59e0b"/>
  <!-- tol: 140→200s = 256.6→366.6px -->
  <rect x="417" y="130" width="110" height="22" rx="3" fill="#ef4444"/>
  <!-- eviction marker at 200s -->
  <line x1="527" y1="122" x2="527" y2="158" stroke="#4ade80" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="530" y="126" fill="#4ade80" font-size="10" font-weight="700">💥 3min20s</text>

  <!-- ROW 3: Normal (eviction at 350s) -->
  <text x="150" y="195" text-anchor="end" fill="#4ade80" font-size="12" font-weight="700">🟢 Normal</text>
  <!-- HB: 0→10s = 0→18.3px -->
  <rect x="160" y="180" width="18" height="22" rx="3" fill="#38bdf8"/>
  <!-- grace: 10→50s = 18.3→91.6px -->
  <rect x="178" y="180" width="73" height="22" rx="3" fill="#f59e0b"/>
  <!-- tol: 50→350s = 91.6→641.6px -->
  <rect x="251" y="180" width="550" height="22" rx="3" fill="#ef4444"/>
  <!-- eviction marker at 350s -->
  <line x1="801" y1="172" x2="801" y2="208" stroke="#4ade80" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="754" y="172" fill="#4ade80" font-size="10" font-weight="700">💥 5min50s</text>

</svg>
